version: "2"
linters:
  default: none
  enable:
    - copyloopvar
    - dogsled
    - dupl
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gocyclo:
      min-complexity: 60
    gosec:
      excludes:
        - G402
  exclusions:
    generated: lax
    rules:
      - linters:
          - staticcheck
        text: "SA1008"
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - builtin$
      - examples$
      - third_party$
      - vendor$
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - builtin$
      - examples$
      - third_party$
      - vendor$
